name: Release APK

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.2.1)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      APP_ID: tugastore
      REF_NAME: ${{ github.ref_name }}
      INPUT_TAG: ${{ inputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v3

      - name: Restore signing material
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${KEYSTORE_BASE64:-}" ]; then
            echo "::error::KEYSTORE_BASE64 secret missing — central app must be release-signed."
            exit 1
          fi
          # tolerate any whitespace in the secret value
          printf '%s' "$KEYSTORE_BASE64" | tr -d '[:space:]' | base64 -d > tuga-release.jks
          if [ ! -s tuga-release.jks ]; then
            echo "::error::keystore decode produced empty file"
            exit 1
          fi
          umask 077
          {
            printf 'storeFile=tuga-release.jks\n'
            printf 'storePassword=%s\n' "$KEYSTORE_PASSWORD"
            printf 'keyAlias=%s\n' "$KEY_ALIAS"
            printf 'keyPassword=%s\n' "$KEY_PASSWORD"
          } > keystore.properties

      - name: Build release APK
        run: ./gradlew --no-daemon assembleRelease

      - name: Stage APK
        id: stage
        run: |
          set -euo pipefail
          src=$(ls app/build/outputs/apk/release/*.apk | head -1)
          if [ -z "$src" ]; then
            echo "::error::no release APK produced"
            exit 1
          fi
          mkdir -p dist
          cp "$src" "dist/${APP_ID}-release.apk"
          TAG="${INPUT_TAG:-$REF_NAME}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "apk=dist/${APP_ID}-release.apk" >> "$GITHUB_OUTPUT"
          echo "sha256=$(sha256sum dist/${APP_ID}-release.apk | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Cleanup signing material
        if: always()
        run: rm -f tuga-release.jks keystore.properties

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.stage.outputs.tag }}
          name: ${{ steps.stage.outputs.tag }}
          generate_release_notes: true
          files: ${{ steps.stage.outputs.apk }}
          fail_on_unmatched_files: true
          body: |
            **SHA-256:** `${{ steps.stage.outputs.sha256 }}`
            **Signed by:** MikTuga release key (SHA-1 `06ebb7ac36717017003232f471908c97d3407c1f`)
